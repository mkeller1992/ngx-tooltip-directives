name: Deploy ngx-tooltip-directives to npmjs.com

on:
  push:
    branches: [ master ]

# Central versions and reusable action references
env:
  BASE_DIR: ./ngx-tooltip-directives-lib
  PROJECT_NAME: ngx-tooltip-directives

  NODE_VERSION: &node-version '24.x'
  NPM_VERSION: &npm-version 'latest'

  CHECKOUT_ACTION: &checkout-action 'actions/checkout@v7'
  SETUP_NODE_ACTION: &setup-node-action 'actions/setup-node@v6.4.0'
  CODECOV_ACTION: &codecov-action 'codecov/codecov-action@v7'

# Needed for OIDC (Trusted Publishing) and for pushing tags back to the repo
permissions:
  id-token: write       # required for npm OIDC (Trusted Publishing)
  contents: write       # required so github-actions[bot] may 'git push' tags

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      # Checkout the repository to the runner
      - uses: *checkout-action

      # Setup Node.js environment
      - name: Use Node.js
        uses: *setup-node-action
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Ensure a recent npm that supports Trusted Publishing + provenance
      - name: Ensure recent npm
        run: npm i -g npm@${{ env.NPM_VERSION }}

      # Safety: remove any accidental project .npmrc that could force tokens
      - name: Remove local .npmrc if present
        run: rm -f .npmrc && rm -f $HOME/.npmrc

      # Install jq tool for JSON processing
      - name: Install jq
        run: sudo apt-get install -y jq

      # Install dependencies at the library level
      - name: Install Dependencies
        run: npm ci
        working-directory: ${{ env.BASE_DIR }}
        env:
          npm_config_foreground_scripts: 'true'   # stabilize nx postinstall on CI
          NX_SKIP_NATIVE_BINARY_DOWNLOAD: 'true'  # prefer JS fallback
          NX_NATIVE: 'false'
          NX_DAEMON: 'false'

      # Run tests at the library level
      - name: Run Tests
        run: npm run test:ci
        working-directory: ${{ env.BASE_DIR }}

      - name: List coverage reports
        run: find coverage -name lcov.info -print
        working-directory: ${{ env.BASE_DIR }}

      - name: Normalize coverage report path
        run: |
          LCOV_FILE="$(find coverage -name lcov.info -print -quit)"
          if [ -z "$LCOV_FILE" ]; then
            echo "No lcov.info file found"
            exit 1
          fi
          mkdir -p coverage/codecov
          cp "$LCOV_FILE" coverage/codecov/lcov.info
        working-directory: ${{ env.BASE_DIR }}

      # Upload coverage to Codecov (tokenless with OIDC + Codecov App)
      - name: Upload coverage to Codecov
        uses: *codecov-action
        with:
          use_oidc: true
          files: ${{ env.BASE_DIR }}/coverage/codecov/lcov.info
          disable_search: true                           # skip auto-discovery to avoid noisy gcov/python warnings

      # Build the library from the specified subdirectory
      - name: Build Library
        run: npx ng build
        working-directory: ${{ env.BASE_DIR }}/projects/${{ env.PROJECT_NAME }}

      # Check if version has been updated
      - name: Check if version has been updated
        id: check_version
        run: |
          # Extract current and latest published version
          PACKAGE_NAME=$(jq -r '.name' package.json)
          CURRENT_VERSION=$(jq -r '.version' package.json)
          echo "CURRENT_VERSION=$CURRENT_VERSION" >> $GITHUB_ENV

          # Public package: npm view works without auth
          LATEST_PUBLISHED_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "0.0.0")
          if [ "$CURRENT_VERSION" = "$LATEST_PUBLISHED_VERSION" ]; then
            echo "execute_publish=false" >> $GITHUB_ENV
          else
            echo "execute_publish=true" >> $GITHUB_ENV
          fi
        working-directory: ${{ env.BASE_DIR }}/dist/${{ env.PROJECT_NAME }}

      # Publish to npm via OIDC (no token)
      - name: Publish to npm via OIDC (no token)
        if: env.execute_publish == 'true'
        run: npm publish
        working-directory: ${{ env.BASE_DIR }}/dist/${{ env.PROJECT_NAME }}
        # No NODE_AUTH_TOKEN here — OIDC handles auth

      # Tag commit (push tag back to this repository using the built-in GITHUB_TOKEN)
      - name: Tag commit
        if: env.execute_publish == 'true' && success()
        run: |
          # Configure git author for the automated tag
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag v${{ env.CURRENT_VERSION }}-lib
          git push origin "v${{ env.CURRENT_VERSION }}-lib"
